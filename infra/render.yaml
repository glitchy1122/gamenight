# Render Blueprint (infra-as-code lite, SDD §29).
# In the Render dashboard: New → Blueprint → point at this repo.
services:
  - type: web
    name: gamenight
    plan: free
    region: singapore
    runtime: docker
    dockerfilePath: ./infra/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false   # set manually in dashboard — Neon connection string, never in git
